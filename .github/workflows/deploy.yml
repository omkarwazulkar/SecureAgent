name: Deploy Secure Agent

on:
  workflow_dispatch:

env:
  ACR_NAME: secureagent
  RESOURCE_GROUP: AzureRG
  CONTAINER_APP_NAME: secure-agent-app

jobs:
  Build-Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login To ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build Docker Image
        run: |
          docker build -t $ACR_NAME.azurecr.io/secureagent:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $ACR_NAME.azurecr.io/secureagent:${{ github.sha }}

      - name: Deploy To Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/secureagent:${{ github.sha }}
